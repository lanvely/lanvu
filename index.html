<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎀 Tạo Link Shopee</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: #fdf2f4; /* Màu hồng pastel nhẹ */
            background-image: radial-gradient(#ffc0cb 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.5);
            width: 100%;
            max-width: 500px;
            text-align: center;
            border: 3px solid #ffb6c1;
            position: relative;
        }

        /* Trang trí nơ Coquette */
        .container::before {
            content: '🎀';
            font-size: 40px;
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
        }

        h1 {
            color: #d63384;
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #b05a7e;
            font-weight: 600;
            margin-bottom: 8px;
            margin-left: 10px;
        }

        input {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #ffd1dc;
            border-radius: 50px;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
            font-size: 14px;
        }

        input:focus {
            border-color: #ffb6c1;
            box-shadow: 0 0 10px #ffdae0;
        }

        button {
            background: #ffb6c1;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(255, 182, 193, 0.4);
        }

        button:hover {
            background: #ff9aa2;
            transform: translateY(-2px);
        }

        .result-box {
            margin-top: 25px;
            padding: 20px;
            background: #fffafa;
            border: 2px dashed #ffc0cb;
            border-radius: 15px;
            display: none;
        }

        .result-header {
            color: #28a745;
            font-weight: 600;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .link-display {
            background: #fff;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #eee;
            font-size: 12px;
            word-break: break-all;
            margin-bottom: 15px;
            color: #666;
        }

        .copy-btn {
            background: #6c757d;
            font-size: 14px;
            padding: 8px 20px;
        }

        .instructions {
            text-align: left;
            font-size: 13px;
            color: #888;
            line-height: 1.6;
            margin-top: 15px;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Tạo Link Shopee</h1>
    
    <div class="input-group">
        <label>Link sản phẩm Shopee</label>
        <input type="text" id="shopeeInput" placeholder="Dán link s.shopee.vn/... vào đây nha">
    </div>

    <button onclick="convertLink()">✨ Tạo Link Ngay</button>

    <div id="resultBox" class="result-box">
        <div class="result-header">✅ Tạo link thành công!</div>
        <div class="link-display" id="outputLink"></div>
        <button class="copy-btn" onclick="copyToClipboard()">📋 Sao chép link</button>

        <div class="instructions">
            <strong>🪄 Hướng dẫn:</strong><br>
            1. Nhấn sao chép link ở phía trên<br>
            2. Dán link vào phần bình luận của bài viết bất kì trên Facebook<br>
            3. Nhấn vào link đã dán đó và nhận mã Facebook để mua hàng nhé! ✨
        </div>
    </div>
</div>

<script>
 async function convertLink() {
        let input = document.getElementById('shopeeInput').value.trim();
        const resultBox = document.getElementById('resultBox');
        const outputLink = document.getElementById('outputLink');

        if (!input) {
            alert('Dâu ơi, dán link vào đã nè!');
            return;
        }

        const newAffId = "17384580288"; 
        const newSubId = "addlivetag-lanvely---";
        
        // Hiện thông báo đang xử lý cho "pro" nè
        outputLink.innerText = "Mochi đang bóc tách link cho Dâu chờ xíu nha... 🎀";
        resultBox.style.display = 'block';

        try {
            let finalOriginLink = input;

            // Nếu là link rút gọn s.shopee.vn, mình đi "giải mã" nó
            if (input.includes("s.shopee.vn") && !input.includes("an_redir")) {
                // Sử dụng API redirect-checker để lấy link đích cuối cùng
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(input)}`);
                const data = await response.json();
                
                // Mochi soi tìm link shopee.vn trong nội dung trả về
                const match = data.contents.match(/https:\/\/shopee\.vn\/[^\s"']+/);
                if (match) {
                    finalOriginLink = match[0].split('?')[0]; // Lấy link sạch, bỏ các tham số rác đằng sau
                }
            }

            // Đóng gói lại thành link Affiliate dài chuẩn chỉnh
            const encodedOrigin = encodeURIComponent(finalOriginLink);
            const finalLink = `https://s.shopee.vn/an_redir?origin_link=${encodedOrigin}&share_channel_code=4&affiliate_id=${newAffId}&sub_id=${newSubId}`;

            outputLink.innerText = finalLink;
            
        } catch (error) {
            // Nếu lỗi (do mạng hoặc API chặn), mình dùng link rút gọn như cũ làm phương án dự phòng
            const encodedOrigin = encodeURIComponent(input);
            outputLink.innerText = `https://s.shopee.vn/an_redir?origin_link=${encodedOrigin}&share_channel_code=4&affiliate_id=${newAffId}&sub_id=${newSubId}`;
            console.log("Lỗi xíu nhưng Mochi vẫn tạo link tạm cho Dâu nè");
        }
    }
</script>

</body>
</html>
