<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công Cụ Tạo Link Shopee Affiliate</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(135deg, #FF9A9E 0%, #FAD0C4 99%); height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; padding: 15px; box-sizing: border-box; }
        .card { background: white; padding: 30px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #E74C3C; margin: 0 0 20px 0; font-weight: 800; font-size: 24px; }
        .label { text-align: left; font-size: 14px; color: #666; margin-bottom: 8px; font-weight: 600; }
        input { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; margin-bottom: 20px; font-size: 15px; background: #fafafa; }
        input:focus { border-color: #FF5722; outline: none; background: white; }
        button { width: 100%; padding: 15px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; transition: all 0.3s ease; }
        .btn-generate { background: #FF5722; color: white; box-shadow: 0 4px 15px rgba(255,87,34,0.3); }
        .btn-generate:disabled { background: #ccc; cursor: not-allowed; }
        .btn-copy { background: #6C5CE7; color: white; margin-top: 10px; }
        #result-area { display: none; margin-top: 25px; border-top: 2px dashed #eee; padding-top: 20px; text-align: left; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .loading-text { font-size: 13px; color: #FF5722; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🛍️ Tạo Link Shopee</h2>
        <div class="label">Nhập link sản phẩm hoặc link rút gọn</div>
        <input type="text" id="shopeeLink" placeholder="Dán link Shopee vào đây...">
        
        <div id="loading" class="loading-text">🔄 Đang giải mã link rút gọn, đợi xíu nha...</div>
        
        <button class="btn-generate" id="btnGen" onclick="generateLink()">🚀 Tạo Link Ngay</button>

        <div id="result-area">
            <div style="color: #27ae60; font-weight: bold; margin-bottom: 10px;">✅ Tạo link thành công!</div>
            <div class="label">Link Affiliate của bạn:</div>
            <input type="text" id="finalLink" readonly>
            <button class="btn-copy" onclick="copyToClipboard()">📋 Copy Link</button>
        </div>
    </div>

    <script>
        async function generateLink() {
            const input = document.getElementById('shopeeLink').value.trim();
            const btn = document.getElementById('btnGen');
            const loading = document.getElementById('loading');
            const resultArea = document.getElementById('result-area');
            const finalInput = document.getElementById('finalLink');

            if (!input.includes('shopee.vn')) {
                alert('Vui lòng nhập đúng link Shopee!');
                return;
            }

            btn.disabled = true;
            btn.innerText = 'Đang xử lý...';
            let targetLink = input;

            // BƯỚC QUAN TRỌNG: Nếu là link rút gọn s.shopee.vn, mình sẽ cố gắng lấy link gốc
            if (input.includes('s.shopee.vn')) {
                loading.style.display = 'block';
                try {
                    // Dùng proxy trung gian để lấy thông tin link gốc
                    const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(input)}`);
                    const data = await response.json();
                    
                    // Tìm link gốc trong đống dữ liệu trả về
                    const match = data.contents.match(/https:\/\/shopee\.vn\/product\/[0-9]+\/[0-9]+/);
                    if (match) {
                        targetLink = match[0];
                    }
                } catch (e) {
                    console.log("Không giải mã được link rút gọn, sử dụng link gốc.");
                }
                loading.style.display = 'none';
            }

            // Gắn Affiliate ID của Dâu
            const affId = "17384580288";
            const baseUrl = "https://s.shopee.vn/an_redir?origin_link=";
            
            // Làm sạch link trước khi gắn
            const cleanLink = targetLink.split('?')[0];
            finalInput.value = baseUrl + encodeURIComponent(cleanLink) + "&affiliate_id=" + affId + "&sub_id=dau-custom-tool";
            
            resultArea.style.display = 'block';
            btn.disabled = false;
            btn.innerText = '🚀 Tạo Link Ngay';
        }

        function copyToClipboard() {
            const copyText = document.getElementById("finalLink");
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            document.execCommand("copy");
            alert("Đã copy link thành công!");
        }
    </script>
</body>
</html>
