<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Link Shopee - Lan Vũ</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #FFF0F5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 8px 25px rgba(255,182,193,0.4); width: 90%; max-width: 380px; text-align: center; border: 1px solid #FFB6C1; position: relative; }
        .card::after { content: '🎀'; position: absolute; top: -15px; left: 50%; transform: translateX(-50%); font-size: 24px; }
        h2 { color: #FF69B4; font-size: 22px; margin-bottom: 20px; font-weight: bold; }
        .label { text-align: left; font-size: 14px; color: #888; margin-bottom: 8px; font-weight: 500; }
        input { width: 100%; padding: 14px; border: 1px solid #FFD1DC; border-radius: 12px; box-sizing: border-box; margin-bottom: 20px; font-size: 15px; background: #FFF9FA; outline: none; }
        button { width: 100%; padding: 14px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-gen { background: #FFB6C1; color: white; }
        .btn-gen:hover { background: #FF9EAF; }
        .btn-copy { background: #B19CD9; color: white; margin-top: 10px; }
        #result-area { display: none; margin-top: 20px; padding-top: 15px; border-top: 1px dashed #FFB6C1; }
        .success-msg { color: #FF69B4; font-size: 14px; font-weight: bold; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Tạo Link Shopee 🎀</h2>
        <div class="label">Dán link Shopee vào đây</div>
        <input type="text" id="shopeeLink" placeholder="https://s.shopee.vn/...">
        <button class="btn-gen" id="btn" onclick="generate()">Tạo Link Ngay</button>

        <div id="result-area">
            <span class="success-msg">✅ Tạo link thành công!</span>
            <input type="text" id="finalLink" readonly>
            <button class="btn-copy" onclick="copy()">Copy link</button>
        </div>
    </div>

    <script>
        const myAffId = "17384580288";

        async function generate() {
            const input = document.getElementById('shopeeLink').value.trim();
            const btn = document.getElementById('btn');
            if (!input.includes('shopee.vn')) return alert('Dâu dán đúng link Shopee nha!');

            btn.innerText = 'Đang xử lý...';
            btn.disabled = true;

            let finalUrl = input;
            if (input.includes('s.shopee.vn')) {
                try {
                    const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(input)}`);
                    const data = await res.json();
                    const match = data.contents.match(/https:\/\/shopee\.vn\/product\/[^"]+/);
                    if (match) finalUrl = match[0].split('?')[0];
                } catch (e) { console.log(e); }
            } else {
                finalUrl = input.split('?')[0];
            }

            const result = `https://s.shopee.vn/an_redir?origin_link=${encodeURIComponent(finalUrl)}&affiliate_id=${myAffId}&sub_id=dau-tool`;
            document.getElementById('finalLink').value = result;
            document.getElementById('result-area').style.display = 'block';
            btn.innerText = 'Tạo Link Ngay';
            btn.disabled = false;
        }

        function copy() {
            const copyText = document.getElementById("finalLink");
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(copyText.value);
            alert("Đã copy link!");
        }
    </script>
</body>
</html>
