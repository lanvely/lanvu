<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool Tạo Link Shopee Facebook</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #ee4d2d; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; margin-bottom: 20px; }
        button { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn-gen { background: #ee4d2d; color: white; }
        .btn-gen:disabled { background: #ccc; }
        .btn-copy { background: #e7f3ff; color: #1877f2; margin-top: 15px; }
        #result-area { display: none; margin-top: 25px; border-top: 1px solid #eee; padding-top: 20px; text-align: left; }
        .status { color: #ee4d2d; font-size: 13px; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🛍️ Tạo Link Shopee</h2>
        <input type="text" id="shopeeLink" placeholder="Dán link rút gọn (s.shopee.vn/...)">
        <div id="loading" class="status">⚙️ Đang bẻ khóa link rút gọn, đợi xíu nha...</div>
        <button class="btn-gen" id="genBtn" onclick="processLink()">Tạo Link Ngay</button>

        <div id="result-area">
            <p style="font-weight: bold; color: #2ecc71; margin-top: 0;">✅ Đã bẻ khóa và tạo xong!</p>
            <input type="text" id="finalLink" readonly style="background: #f9f9f9; font-size: 13px;">
            <button class="btn-copy" onclick="copyLink()">Sao chép đường dẫn</button>
        </div>
    </div>

    <script>
        async function processLink() {
            const input = document.getElementById('shopeeLink').value.trim();
            const genBtn = document.getElementById('genBtn');
            const loading = document.getElementById('loading');
            const resultArea = document.getElementById('result-area');
            const finalInput = document.getElementById('finalLink');

            if (!input.includes('shopee.vn')) {
                alert('Dâu dán đúng link Shopee nha!');
                return;
            }

            genBtn.disabled = true;
            loading.style.display = 'block';
            resultArea.style.display = 'none';

            let productUrl = input;

            // Xử lý bẻ khóa link rút gọn s.shopee.vn
            if (input.includes('s.shopee.vn')) {
                try {
                    // Dùng proxy để đọc dữ liệu trang Shopee
                    const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(input)}`);
                    const data = await response.json();
                    
                    // Mẹo: Shopee thường để link gốc trong thẻ meta hoặc script dưới dạng /product/ID_Shop/ID_Sản_Phẩm
                    // Chúng ta sẽ "câu" cái đoạn đó ra
                    const match = data.contents.match(/shopee\.vn\/.*-i\.[0-9]+\.[0-9]+/);
                    if (match) {
                        productUrl = "https://" + match[0].split('?')[0];
                    } else {
                        // Tìm theo cấu trúc khác nếu cấu trúc trên lỗi
                        const productMatch = data.contents.match(/https:\/\/shopee\.vn\/product\/[0-9]+\/[0-9]+/);
                        if (productMatch) productUrl = productMatch[0];
                    }
                } catch (e) {
                    console.error("Lỗi bẻ khóa link.");
                }
            }

            const affId = "17384580288";
            const baseUrl = "https://s.shopee.vn/an_redir?origin_link=";
            const cleanUrl = productUrl.split('?')[0];
            
            finalInput.value = `${baseUrl}${encodeURIComponent(cleanUrl)}&affiliate_id=${affId}&sub_id=dau-tool`;
            
            loading.style.display = 'none';
            genBtn.disabled = false;
            resultArea.style.display = 'block';
        }

        function copyLink() {
            const copyText = document.getElementById("finalLink");
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            document.execCommand("copy");
            alert("Đã sao chép link tiếp thị!");
        }
    </script>
</body>
</html>
