<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎀 Tạo Link Shopee</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: #fdf2f4; /* Màu hồng pastel nhẹ */
            background-image: radial-gradient(#ffc0cb 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.5);
            width: 100%;
            max-width: 500px;
            text-align: center;
            border: 3px solid #ffb6c1;
            position: relative;
        }

        /* Trang trí nơ Coquette */
        .container::before {
            content: '🎀';
            font-size: 40px;
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
        }

        h1 {
            color: #d63384;
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #b05a7e;
            font-weight: 600;
            margin-bottom: 8px;
            margin-left: 10px;
        }

        input {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #ffd1dc;
            border-radius: 50px;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
            font-size: 14px;
        }

        input:focus {
            border-color: #ffb6c1;
            box-shadow: 0 0 10px #ffdae0;
        }

        button {
            background: #ffb6c1;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(255, 182, 193, 0.4);
        }

        button:hover {
            background: #ff9aa2;
            transform: translateY(-2px);
        }

        .result-box {
            margin-top: 25px;
            padding: 20px;
            background: #fffafa;
            border: 2px dashed #ffc0cb;
            border-radius: 15px;
            display: none;
        }

        .result-header {
            color: #28a745;
            font-weight: 600;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .link-display {
            background: #fff;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #eee;
            font-size: 12px;
            word-break: break-all;
            margin-bottom: 15px;
            color: #666;
        }

        .copy-btn {
            background: #ccc; /* Mặc định màu xám khi chưa có link */
            font-size: 14px;
            padding: 8px 20px;
            transition: 0.5s; /* Hiệu ứng đổi màu mượt mà */
            pointer-events: none; /* Chưa có link thì không cho bấm */
            opacity: 0.7;
        }

        .copy-btn.ready {
            background: #ffb6c1; /* Đổi sang màu hồng khi xong */
            pointer-events: auto;
            opacity: 1;
            cursor: pointer;
        }

        .instructions {
            text-align: left;
            font-size: 13px;
            color: #888;
            line-height: 1.6;
            margin-top: 15px;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Tạo Link Shopee</h1>
    
    <div class="input-group">
        <label>Link sản phẩm Shopee</label>
        <input type="text" id="shopeeInput" placeholder="Dán link s.shopee.vn/... vào đây nha">
    </div>

    <button onclick="convertLink()">✨ Tạo Link Ngay</button>

    <div id="resultBox" class="result-box">
        <div class="result-header">✅ Tạo link thành công!</div>
        <div class="link-display" id="outputLink"></div>
        <button class="copy-btn" onclick="copyToClipboard()">📋 Sao chép link</button>

        <div class="instructions">
            <strong>🪄 Hướng dẫn:</strong><br>
            1. Nhấn sao chép link ở phía trên<br>
            2. Dán link vào phần bình luận của bài viết bất kì trên Facebook<br>
            3. Nhấn vào link đã dán đó và nhận mã Facebook để mua hàng nhé! ✨
        </div>
    </div>
</div>

<script>
    async function convertLink() {
        const input = document.getElementById('shopeeInput').value.trim();
        const resultBox = document.getElementById('resultBox');
        const outputLink = document.getElementById('outputLink');
        const copyBtn = document.querySelector('.copy-btn');
        const header = document.querySelector('.result-header');

        if (!input) {
            alert('Dâu ơi, dán link vào đã nè!');
            return;
        }

        const newAffId = "17384580288"; 
        const newSubId = "addlivetag-lanvely---";
        
        // Reset trạng thái nút mỗi lần bấm tạo mới
        copyBtn.classList.remove('ready');
        resultBox.style.display = 'block';
        outputLink.innerText = "Mochi đang biến hóa link cho Dâu... ✨";
        header.innerHTML = "⏳ Đang xử lý...";
        header.style.color = "#d63384";

        try {
            // Thiết lập thời gian chờ (timeout) 3 giây cho việc soi link dài
            // Nếu sau 3 giây không soi được link dài, mình dùng link rút gọn luôn cho nhanh
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 3500);

            let finalOriginLink = input;

            if (input.includes("s.shopee.vn") && !input.includes("an_redir")) {
                try {
                    const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(input)}`, { signal: controller.signal });
                    const data = await response.json();
                    const match = data.contents.match(/https:\/\/shopee\.vn\/[^\s"']+/);
                    if (match) {
                        finalOriginLink = match[0].split('?')[0]; 
                    }
                } catch (e) {
                    console.log("Soi lâu quá, Mochi dùng link gốc Dâu đưa luôn cho nhanh nha!");
                }
            }

            const encodedOrigin = encodeURIComponent(finalOriginLink);
            const finalLink = `https://s.shopee.vn/an_redir?origin_link=${encodedOrigin}&share_channel_code=4&affiliate_id=${newAffId}&sub_id=${newSubId}`;

            // Hiển thị kết quả
            outputLink.innerText = finalLink;
            header.innerHTML = "✅ Xong rồi nè!";
            header.style.color = "#28a745";
            
            // Kích hoạt nút Copy sang màu hồng
            copyBtn.classList.add('ready');

        } catch (error) {
            const encodedOrigin = encodeURIComponent(input);
            outputLink.innerText = `https://s.shopee.vn/an_redir?origin_link=${encodedOrigin}&share_channel_code=4&affiliate_id=${newAffId}&sub_id=${newSubId}`;
            copyBtn.classList.add('ready');
        }
    }

    function copyToClipboard() {
        const text = document.getElementById('outputLink').innerText;
        const el = document.createElement('textarea');
        el.value = text;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        
        alert('Đã copy link thành công! 🎀');
    }
</script>

</body>
</html>
