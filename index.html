<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Link Shopee Affiliate</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #f4f4f7; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 400px; }
        h2 { color: #ee4d2d; text-align: center; margin-bottom: 25px; }
        input { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 16px; margin-bottom: 20px; }
        input:focus { border-color: #ee4d2d; outline: none; }
        button { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn-gen { background: #ee4d2d; color: white; }
        .btn-copy { background: #5a4bcf; color: white; margin-top: 10px; }
        #result-area { display: none; margin-top: 25px; border-top: 1px solid #eee; padding-top: 20px; }
        .loading { color: #ee4d2d; font-size: 14px; text-align: center; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🛍️ Shopee Affiliate</h2>
        <input type="text" id="shopeeLink" placeholder="Dán link Shopee vào đây...">
        <div id="loading" class="loading">⚙️ Đang bẻ khóa link rút gọn...</div>
        <button class="btn-gen" id="genBtn" onclick="processLink()">Tạo Link Ngay</button>

        <div id="result-area">
            <p style="font-weight: bold; color: #2ecc71; margin-top: 0;">✅ Đã tạo xong!</p>
            <input type="text" id="finalLink" readonly style="background: #f9f9f9;">
            <button class="btn-copy" onclick="copyLink()">📋 Copy Link</button>
        </div>
    </div>

    <script>
        async function processLink() {
            const input = document.getElementById('shopeeLink').value.trim();
            const genBtn = document.getElementById('genBtn');
            const loading = document.getElementById('loading');
            const resultArea = document.getElementById('result-area');
            const finalInput = document.getElementById('finalLink');

            if (!input.includes('shopee.vn')) {
                alert('Dâu dán nhầm link rồi, kiểm tra lại nha!');
                return;
            }

            genBtn.disabled = true;
            loading.style.display = 'block';
            resultArea.style.display = 'none';

            let productLink = input;

            // Xử lý link rút gọn s.shopee.vn
            if (input.includes('s.shopee.vn')) {
                try {
                    // Dùng dịch vụ lấy nội dung trang để tìm link gốc
                    const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(input)}`);
                    const data = await response.json();
                    
                    // Tìm cấu trúc shopee.vn/product/ hoặc shopee.vn/tên-sản- phẩm-i.
                    const match = data.contents.match(/https:\/\/shopee\.vn\/[a-zA-Z0-9.\-_]+\-i\.[0-9]+\.[0-9]+/);
                    if (match) {
                        productLink = match[0];
                    }
                } catch (e) {
                    console.error("Lỗi giải mã, dùng link gốc.");
                }
            }

            // Gắn Affiliate ID của Dâu
            const affId = "17384580288";
            const baseUrl = "https://s.shopee.vn/an_redir?origin_link=";
            
            // Làm sạch link (bỏ các ký tự rác sau dấu ?)
            const cleanUrl = productLink.split('?')[0];
            
            finalInput.value = baseUrl + encodeURIComponent(cleanUrl) + "&affiliate_id=" + affId + "&sub_id=dau-tool";
            
            loading.style.display = 'none';
            genBtn.disabled = false;
            resultArea.style.display = 'block';
        }

        function copyLink() {
            const copyText = document.getElementById("finalLink");
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            document.execCommand("copy");
            alert("Đã copy link tiếp thị!");
        }
    </script>
</body>
</html>
