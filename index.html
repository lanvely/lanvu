<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Tạo Link Shopee 💖</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ffd6e7, #e6ccff);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff0f5;
      padding: 30px;
      border-radius: 20px;
      width: 400px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      text-align: center;
    }

    h1 {
      color: #ff4d88;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 2px solid #ffcce0;
      margin-bottom: 15px;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      background: #ff66a3;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 15px;
    }

    button:hover {
      background: #ff3385;
    }

    .result {
      background: #fff;
      padding: 15px;
      border-radius: 12px;
      border: 2px dashed #ff99c8;
      word-break: break-all;
      font-size: 13px;
    }

    .copy-btn {
      margin-top: 10px;
      background: #a366ff;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>🎀 Tạo Link Shopee</h1>

  <input id="inputLink" placeholder="Dán link Shopee vào đây..." />

  <button onclick="generateLink()">💖 Tạo Link Ngay</button>

  <div id="outputBox" style="display:none;">
    <div class="result" id="result"></div>
    <button class="copy-btn" onclick="copyLink()">📋 Copy</button>
  </div>
</div>

<script>
const AFF_ID = "17384580288";
const SUB_ID = "addlivetag-hanghtb---";

async function generateLink() {
  let input = document.getElementById("inputLink").value.trim();
  if (!input) return alert("Dán link vào đi Dâu ơi 😭");

  try {
    // resolve link rút gọn
    let res = await fetch(input, { method: "HEAD", redirect: "follow" });
    let finalUrl = res.url;

    // encode
    let encoded = encodeURIComponent(finalUrl);

    let finalLink = `https://s.shopee.vn/an_redir?origin_link=${encoded}&share_channel_code=4&affiliate_id=${AFF_ID}&sub_id=${SUB_ID}`;

    document.getElementById("result").innerText = finalLink;
    document.getElementById("outputBox").style.display = "block";

  } catch (e) {
    alert("Link lỗi hoặc Shopee chặn rồi 😭");
  }
}

function copyLink() {
  let text = document.getElementById("result").innerText;
  navigator.clipboard.writeText(text);
  alert("Đã copy link 💖");
}
</script>

</body>
</html>
