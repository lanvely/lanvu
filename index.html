<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Link Shopee - Dâu</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: linear-gradient(135deg, #FF9A9E 0%, #FAD0C4 99%, #FAD0C4 100%); height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; box-sizing: border-box; }
        h2 { color: #E74C3C; margin-bottom: 20px; margin-top: 0; font-weight: 800; }
        p.label { text-align: left; font-size: 14px; color: #555; margin-bottom: 8px; font-weight: 600; }
        input { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; margin-bottom: 20px; font-size: 15px; background: #fafafa; }
        input:focus { border-color: #FF5722; outline: none; background: white; }
        button { width: 100%; padding: 14px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; transition: all 0.3s ease; }
        .btn-generate { background: #FF5722; color: white; box-shadow: 0 4px 15px rgba(255,87,34,0.3); }
        .btn-generate:hover { background: #E64A19; transform: translateY(-2px); }
        .btn-copy { background: #6C5CE7; color: white; box-shadow: 0 4px 15px rgba(108,92,231,0.3); margin-top: 10px; }
        .btn-copy:hover { background: #5A4BCF; transform: translateY(-2px); }
        #result-area { display: none; margin-top: 25px; border-top: 2px dashed #eee; padding-top: 20px; text-align: left; }
        #finalLink { background: #f0f0f0; border-color: #ccc; color: #333; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🛍️ Tạo Link Shopee</h2>
        <p class="label">Link sản phẩm Shopee</p>
        <input type="text" id="shopeeLink" placeholder="Dán link Shopee vào đây (s.shopee.vn/...)">
        <button class="btn-generate" onclick="generateLink()">🔥 Tạo Link Ngay</button>

        <div id="result-area">
            <p style="color: #27ae60; font-weight: bold; font-size: 14px; margin: 0 0 10px 0;">✅ Tạo link thành công!</p>
            <p class="label">Link Affiliate của Dâu:</p>
            <input type="text" id="finalLink" readonly>
            <button class="btn-copy" onclick="copyToClipboard()">📋 Copy</button>
        </div>
    </div>

    <script>
        function generateLink() {
            const inputElement = document.getElementById('shopeeLink');
            const input = inputElement.value.trim();
            const resultArea = document.getElementById('result-area');
            const finalInput = document.getElementById('finalLink');

            if (input && input.includes('shopee.vn')) {
                // Công thức nối link ĐÃ CẬP NHẬT AFF ID MỚI: 17384580288
                const baseUrl = "https://s.shopee.vn/an_redir?origin_link=";
                
                // Lấy link gốc trước dấu ? nếu có, rồi mã hóa URL
                const encodedLink = encodeURIComponent(input.split('?')[0]); 
                
                // ĐUÔI AFFILIATE ID MỚI CỦA DÂU
                const affiliatePart = "&affiliate_id=17384580288&sub_id=dau-custom-tool";
                
                finalInput.value = baseUrl + encodedLink + affiliatePart;
                
                // Hiển thị phần kết quả với hiệu ứng mượt mà (nếu muốn)
                resultArea.style.display = 'block';
                
                // Tự động cuộn xuống phần kết quả trên điện thoại
                window.scrollTo(0, document.body.scrollHeight);

            } else {
                alert('Dâu ơi, dán đúng link Shopee (có chứa shopee.vn) mới tạo được nha!');
                resultArea.style.display = 'none';
            }
        }

        function copyToClipboard() {
            const copyText = document.getElementById("finalLink");
            
            // Cách copy chuẩn cho mobile
            copyText.select();
            copyText.setSelectionRange(0, 99999); // Dành cho di động
            
            try {
                navigator.clipboard.writeText(copyText.value);
                alert("Đã copy link rồi nè Dâu!");
            } catch (err) {
                // Cách fallback nếu Navigator clipboard không hoạt động
                document.execCommand("copy");
                alert("Đã copy link rồi nè Dâu! (fallback)");
            }
        }
    </script>
</body>
</html>
