<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công Cụ Tạo Link Shopee Affiliate</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: linear-gradient(135deg, #FF9A9E 0%, #FAD0C4 99%, #FAD0C4 100%); height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; padding: 10px; box-sizing: border-box; }
        .card { background: white; padding: 30px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 100%; max-width: 420px; text-align: center; box-sizing: border-box; position: relative; }
        h2 { color: #E74C3C; margin-bottom: 25px; margin-top: 0; font-weight: 800; font-size: 26px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .label { text-align: left; font-size: 15px; color: #555; margin-bottom: 8px; font-weight: 600; padding-left: 2px; }
        input { width: 100%; padding: 16px; border: 1px solid #ddd; border-radius: 14px; box-sizing: border-box; margin-bottom: 25px; font-size: 16px; background: #fafafa; transition: all 0.2s; }
        input:focus { border-color: #FF5722; outline: none; background: white; box-shadow: 0 0 0 3px rgba(255,87,34,0.1); }
        button { width: 100%; padding: 16px; border: none; border-radius: 14px; cursor: pointer; font-weight: bold; font-size: 17px; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-generate { background: #FF5722; color: white; box-shadow: 0 4px 15px rgba(255,87,34,0.3); }
        .btn-generate:hover { background: #E64A19; transform: translateY(-2px); }
        .btn-generate:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; }
        .btn-copy { background: #6C5CE7; color: white; box-shadow: 0 4px 15px rgba(108,92,231,0.3); margin-top: 15px; }
        .btn-copy:hover { background: #5A4BCF; transform: translateY(-2px); }
        #result-area { display: none; margin-top: 30px; border-top: 2px dashed #eee; padding-top: 25px; text-align: left; animation: fadeIn 0.5s; }
        #finalLink { background: #f0f0f0; border-color: #ccc; color: #333; margin-bottom: 10px; cursor: text; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #FF5722; border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="card">
        <h2>🛍️ Tạo Link Shopee</h2>
        <div class="label">Dán link sản phẩm Shopee vào đây</div>
        <input type="text" id="shopeeLink" placeholder="Ví dụ: https://s.shopee.vn/... hoặc https://shopee.vn/... ">
        <button class="btn-generate" id="generateBtn" onclick="generateLink()">
            <span class="loader" id="loader"></span>
            <span id="btnText">🔥 Tạo Link Tiếp Thị</span>
        </button>

        <div id="result-area">
            <div style="color: #27ae60; font-weight: bold; font-size: 15px; margin: 0 0 15px 0; display: flex; align-items: center; gap: 8px;">✅ Tạo link thành công!</div>
            <div class="label">Link Affiliate của bạn:</div>
            <input type="text" id="finalLink" readonly>
            <button class="btn-copy" onclick="copyToClipboard()">📋 Copy Link</button>
        </div>
    </div>

    <script>
        // Affiliate ID của Dâu: 17384580288
        const dauAffiliateId = "17384580288";

        async function generateLink() {
            const inputElement = document.getElementById('shopeeLink');
            const input = inputElement.value.trim();
            const resultArea = document.getElementById('result-area');
            const finalInput = document.getElementById('finalLink');
            const generateBtn = document.getElementById('generateBtn');
            const loader = document.getElementById('loader');
            const btnText = document.getElementById('btnText');

            if (!input || !input.includes('shopee.vn')) {
                alert('Vui lòng dán đúng đường dẫn sản phẩm Shopee (có chứa shopee.vn) nha!');
                resultArea.style.display = 'none';
                return;
            }

            // Hiển thị trạng thái đang xử lý
            generateBtn.disabled = true;
            loader.style.display = 'inline-block';
            btnText.innerText = 'Đang xử lý...';
            resultArea.style.display = 'none';

            let finalUrl = input;

            // XỬ LÝ QUAN TRỌNG: Giải mã link rút gọn s.shopee.vn thành link gốc
            if (input.includes('s.shopee.vn')) {
                try {
                    // Sử dụng dịch vụ proxy trung gian để "mở" link rút gọn
                    const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(input)}`);
                    if (!response.ok) throw new Error('Network response was not ok');
                    const data = await response.json();
                    
                    // Tìm link gốc đầy đủ (shopee.vn/product/...) trong dữ liệu trả về
                    const match = data.contents.match(/https:\/\/shopee\.vn\/product\/[^"]+/);
                    if (match) {
                        finalUrl = match[0].split('?')[0]; // Lấy link sạch, bỏ các tham số thừa
                    } else {
                        // Thử cách khác nếu cách trên không tìm thấy
                        const fallbackMatch = data.contents.match(/https:\/\/shopee\.vn\/[^"]+/);
                        if (fallbackMatch) {
                            finalUrl = fallbackMatch[0].split('?')[0];
                        }
                    }
                } catch (e) {
                    console.error("Lỗi giải mã link rút gọn, dùng link gốc dán vào.", e);
                    // Nếu lỗi thì giữ nguyên link dán vào để nối, nhưng tỷ lệ mất đơn cao hơn
                }
            } else {
                // Nếu dán link dài shopee.vn/... thì chỉ cần lấy link sạch trước dấu ?
                finalUrl = input.split('?')[0];
            }

            // Công thức nối link tiếp thị chuẩn
            const baseUrl = "https://s.shopee.vn/an_redir?origin_link=";
            const encodedLink = encodeURIComponent(finalUrl); 
            const affiliatePart = `&affiliate_id=${dauAffiliateId}&sub_id=dau-custom-tool`;
            
            finalInput.value = baseUrl + encodedLink + affiliatePart;
            
            // Khôi phục trạng thái nút bấm và hiển thị kết quả
            generateBtn.disabled = false;
            loader.style.display = 'none';
            btnText.innerText = '🔥 Tạo Link Ngay';
            resultArea.style.display = 'block';
            
            // Tự động cuộn xuống phần kết quả trên điện thoại
            setTimeout(() => {
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }, 100);
        }

        function copyToClipboard() {
            const copyText = document.getElementById("finalLink");
            
            // Cách copy chuẩn và mượt mà nhất cho mobile
            copyText.select();
            copyText.setSelectionRange(0, 99999); // Dành cho di động
            
            try {
                // Thử dùng API copy hiện đại
                navigator.clipboard.writeText(copyText.value).then(() => {
                    alert("Đã copy link!");
                });
            } catch (err) {
                // Cách fallback nếu API trên không hoạt động trên trình duyệt cũ
                document.execCommand("copy");
                alert("Đã copy link!");
            }
        }
    </script>
</body>
</html>
